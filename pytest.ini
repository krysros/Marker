[pytest]
addopts = --strict-markers

testpaths =
    marker
    tests

markers =
    integration: integration tests that may require external services or slow operations

filterwarnings =
    error
    ignore::UserWarning:pyramid.asset
    ignore::DeprecationWarning:pkg_resources
    ignore:.*_UnionGenericAlias.*:DeprecationWarning:google.genai
    ignore:.*datetime.datetime.utcnow.*:DeprecationWarning:webob.cookies
    ignore::pytest.PytestUnraisableExceptionWarning
